services:
  webhook_db:
    image: pgvector/pgvector:pg16
    container_name: webhook_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${WH_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${WH_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${WH_POSTGRES_DB:-webhook_db}
    volumes:
      - webhook_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${WH_POSTGRES_USER:-postgres} -d ${WH_POSTGRES_DB:-webhook_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  webhook_db_data:
